<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Local MD app icon: friendly robot doctor, flat cartoon style -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dff1fb"/>
      <stop offset="1" stop-color="#bfe3ef"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#sky)"/>

  <!-- soft badge circle behind the robot -->
  <circle cx="512" cy="520" r="380" fill="#ffffff" opacity="0.45"/>

  <!-- antenna -->
  <rect x="497" y="120" width="30" height="80" rx="15" fill="#8fa3ad"/>
  <circle cx="512" cy="106" r="42" fill="#ff5a5f"/>
  <rect x="500" y="88" width="24" height="36" rx="6" fill="#ffffff"/>
  <rect x="494" y="94" width="36" height="24" rx="6" fill="#ffffff"/>

  <!-- head -->
  <rect x="292" y="190" width="440" height="330" rx="90" fill="#f4f7f8"/>
  <rect x="292" y="190" width="440" height="330" rx="90" fill="none" stroke="#d7dfe3" stroke-width="10"/>
  <!-- head mirror band -->
  <rect x="292" y="238" width="440" height="34" rx="17" fill="#7fc8d9"/>
  <circle cx="512" cy="255" r="46" fill="#e8eef0" stroke="#b7c6cc" stroke-width="8"/>
  <circle cx="512" cy="255" r="20" fill="#cfe6ec"/>

  <!-- eyes -->
  <circle cx="415" cy="382" r="52" fill="#243b47"/>
  <circle cx="609" cy="382" r="52" fill="#243b47"/>
  <circle cx="432" cy="366" r="16" fill="#ffffff"/>
  <circle cx="626" cy="366" r="16" fill="#ffffff"/>
  <!-- rosy cheeks -->
  <circle cx="352" cy="432" r="24" fill="#ffb3ad"/>
  <circle cx="672" cy="432" r="24" fill="#ffb3ad"/>
  <!-- smile -->
  <path d="M452 448 Q512 492 572 448" fill="none" stroke="#243b47" stroke-width="16" stroke-linecap="round"/>

  <!-- ear bolts -->
  <rect x="252" y="330" width="44" height="100" rx="22" fill="#8fa3ad"/>
  <rect x="728" y="330" width="44" height="100" rx="22" fill="#8fa3ad"/>

  <!-- body: white coat -->
  <path d="M312 570 Q512 520 712 570 L740 900 L284 900 Z" fill="#ffffff" stroke="#d7dfe3" stroke-width="10"/>
  <!-- coat lapels -->
  <path d="M452 556 L512 640 L572 556" fill="none" stroke="#d7dfe3" stroke-width="10"/>
  <!-- red cross badge -->
  <g transform="translate(628 660)">
    <circle r="56" fill="#ff5a5f"/>
    <rect x="-14" y="-34" width="28" height="68" rx="6" fill="#ffffff"/>
    <rect x="-34" y="-14" width="68" height="28" rx="6" fill="#ffffff"/>
  </g>

  <!-- stethoscope -->
  <path d="M430 580 Q430 760 512 760 Q594 760 594 580" fill="none" stroke="#4a6572" stroke-width="22" stroke-linecap="round"/>
  <circle cx="512" cy="792" r="44" fill="#4a6572"/>
  <circle cx="512" cy="792" r="24" fill="#9fb6bf"/>
</svg>

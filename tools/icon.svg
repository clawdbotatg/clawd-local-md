<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A9DEF4"/>
      <stop offset="1" stop-color="#E9F8DC"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1024" height="1024" fill="url(#sky)"/>
  <circle cx="880" cy="150" r="120" fill="#FFE28A" opacity="0.55"/>
  <circle cx="880" cy="150" r="78" fill="#FFD97A"/>

  <!-- clouds -->
  <g fill="#FFFFFF" opacity="0.9">
    <ellipse cx="200" cy="170" rx="90" ry="34"/>
    <ellipse cx="270" cy="150" rx="70" ry="30"/>
    <ellipse cx="600" cy="110" rx="70" ry="26"/>
  </g>

  <!-- hills -->
  <ellipse cx="220" cy="1010" rx="620" ry="290" fill="#8FD08A"/>
  <ellipse cx="850" cy="1080" rx="700" ry="330" fill="#6DBE6C"/>

  <!-- ===== snake (right) ===== -->
  <g>
    <!-- coils -->
    <ellipse cx="722" cy="812" rx="212" ry="86" fill="#3AA34B"/>
    <ellipse cx="716" cy="756" rx="178" ry="72" fill="#4FBE5E"/>
    <ellipse cx="712" cy="700" rx="140" ry="60" fill="#3AA34B"/>
    <!-- tail tip -->
    <path d="M918 800 q70 -18 52 -78 q-10 40 -68 44 z" fill="#4FBE5E"/>
    <!-- neck rising from top coil -->
    <path d="M648 706 C640 600 660 520 706 478 C752 436 806 452 800 512 C796 552 760 568 736 560
             C748 610 744 660 738 700 Z" fill="#4FBE5E"/>
    <!-- head -->
    <ellipse cx="736" cy="470" rx="98" ry="82" fill="#4FBE5E"/>
    <!-- snout shading -->
    <ellipse cx="700" cy="500" rx="52" ry="30" fill="#B9EC9B"/>
    <!-- eyes -->
    <g>
      <circle cx="700" cy="446" r="30" fill="#FFFFFF"/>
      <circle cx="692" cy="450" r="14" fill="#2C2C2C"/>
      <circle cx="687" cy="444" r="5" fill="#FFFFFF"/>
      <circle cx="774" cy="446" r="30" fill="#FFFFFF"/>
      <circle cx="766" cy="450" r="14" fill="#2C2C2C"/>
      <circle cx="761" cy="444" r="5" fill="#FFFFFF"/>
    </g>
    <!-- cheeks -->
    <ellipse cx="668" cy="482" rx="16" ry="10" fill="#FF9E9E" opacity="0.8"/>
    <ellipse cx="800" cy="482" rx="16" ry="10" fill="#FF9E9E" opacity="0.8"/>
    <!-- smile -->
    <path d="M700 502 Q730 526 762 502" stroke="#2C6B33" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- tongue -->
    <path d="M731 520 q-2 26 -18 34 m18 -34 q4 26 18 36" stroke="#E4574F" stroke-width="9" fill="none" stroke-linecap="round"/>
  </g>

  <!-- focus brackets around snake -->
  <g stroke="#FFFFFF" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.95">
    <path d="M556 428 v-50 h50"/>
    <path d="M890 378 h50 v50"/>
    <path d="M940 860 v50 h-50"/>
    <path d="M606 910 h-50 v-50"/>
  </g>

  <!-- ===== explorer (left) ===== -->
  <g>
    <!-- legs -->
    <rect x="218" y="700" width="40" height="90" rx="18" fill="#F7C99B"/>
    <rect x="286" y="700" width="40" height="90" rx="18" fill="#F7C99B"/>
    <!-- boots -->
    <path d="M212 776 h52 a10 10 0 0 1 10 10 v22 h-72 v-22 a10 10 0 0 1 10 -10z" fill="#7A5230"/>
    <path d="M280 776 h52 a10 10 0 0 1 10 10 v22 h-72 v-22 a10 10 0 0 1 10 -10z" fill="#7A5230"/>
    <!-- shorts -->
    <path d="M204 640 h136 v56 a24 24 0 0 1 -24 24 h-30 l-14 -26 l-14 26 h-30 a24 24 0 0 1 -24 -24 z" fill="#8B9E63"/>
    <!-- torso -->
    <rect x="196" y="520" width="152" height="140" rx="44" fill="#EFC98D"/>
    <!-- shirt pocket line -->
    <line x1="272" y1="530" x2="272" y2="650" stroke="#D9AE6C" stroke-width="8"/>
    <circle cx="272" cy="560" r="5" fill="#8A5A33"/>
    <circle cx="272" cy="596" r="5" fill="#8A5A33"/>
    <!-- extended right arm holding phone -->
    <path d="M330 560 Q400 540 438 552" stroke="#EFC98D" stroke-width="44" fill="none" stroke-linecap="round"/>
    <!-- hand -->
    <circle cx="446" cy="556" r="26" fill="#F7C99B"/>
    <!-- head -->
    <circle cx="266" cy="420" r="92" fill="#F7C99B"/>
    <!-- ear -->
    <circle cx="186" cy="428" r="16" fill="#F0B989"/>
    <!-- hat -->
    <ellipse cx="266" cy="386" rx="142" ry="36" fill="#E3B36B"/>
    <path d="M188 382 a78 64 0 0 1 156 0 q0 14 -78 14 t-78 -14z" fill="#E3B36B"/>
    <path d="M188 382 q78 24 156 0 v0 q0 16 -78 16 t-78 -16z" fill="#7A4E2D"/>
    <!-- face: looking right toward snake -->
    <circle cx="292" cy="418" r="11" fill="#2C2C2C"/>
    <circle cx="330" cy="414" r="11" fill="#2C2C2C"/>
    <path d="M296 452 Q316 468 336 450" stroke="#B0693C" stroke-width="9" fill="none" stroke-linecap="round"/>
    <ellipse cx="268" cy="452" rx="15" ry="9" fill="#FF9E9E" opacity="0.7"/>
    <!-- phone in hand (portrait, camera toward snake) -->
    <g transform="rotate(8 470 540)">
      <rect x="440" y="480" width="64" height="118" rx="16" fill="#37404E"/>
      <rect x="448" y="492" width="48" height="86" rx="8" fill="#9AD7FF"/>
      <circle cx="472" cy="590" r="7" fill="#9AD7FF"/>
    </g>
    <!-- camera flash sparkle -->
    <g fill="#FFF3B0" stroke="#FFD97A" stroke-width="6" stroke-linejoin="round">
      <path d="M520 448 l10 26 26 10 -26 10 -10 26 -10 -26 -26 -10 26 -10z"/>
    </g>
  </g>
</svg>

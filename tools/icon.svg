<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- App icon: hologram robot doctor beaming out of a phone, outdoors. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8dbf2"/>
      <stop offset="1" stop-color="#d5eedb"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#a5eaff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#a5eaff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#sky)"/>

  <!-- sun + hill -->
  <circle cx="850" cy="170" r="100" fill="#f7e08c" opacity="0.5"/>
  <circle cx="850" cy="170" r="66" fill="#f9d95d"/>
  <path d="M0 830 Q300 730 620 810 Q860 866 1024 800 L1024 1024 L0 1024 Z" fill="#8cc981"/>

  <!-- beam -->
  <path d="M420 880 L604 880 L788 240 L236 240 Z" fill="url(#beam)"/>
  <ellipse cx="512" cy="246" rx="278" ry="26" fill="#a5eaff" opacity="0.3"/>

  <!-- hologram robot doctor -->
  <g opacity="0.95">
    <ellipse cx="512" cy="470" rx="300" ry="290" fill="#c4f1ff" opacity="0.28"/>
    <!-- antenna -->
    <rect x="496" y="196" width="32" height="60" rx="16" fill="#3aa7c9"/>
    <circle cx="512" cy="186" r="38" fill="#59c3e3"/>
    <rect x="501" y="170" width="22" height="33" rx="6" fill="#ffffff"/>
    <rect x="495" y="175" width="33" height="22" rx="6" fill="#ffffff"/>
    <!-- head -->
    <rect x="330" y="252" width="364" height="272" rx="80" fill="#cff3ff" stroke="#3aa7c9" stroke-width="14"/>
    <rect x="330" y="292" width="364" height="30" rx="15" fill="#59c3e3"/>
    <circle cx="512" cy="307" r="40" fill="#e8fbff" stroke="#3aa7c9" stroke-width="9"/>
    <!-- eyes / smile -->
    <circle cx="430" cy="408" r="42" fill="#14607c"/>
    <circle cx="594" cy="408" r="42" fill="#14607c"/>
    <circle cx="444" cy="395" r="13" fill="#ffffff"/>
    <circle cx="608" cy="395" r="13" fill="#ffffff"/>
    <path d="M458 462 Q512 500 566 462" fill="none" stroke="#14607c" stroke-width="14" stroke-linecap="round"/>
    <!-- ears -->
    <rect x="296" y="368" width="36" height="84" rx="18" fill="#3aa7c9"/>
    <rect x="692" y="368" width="36" height="84" rx="18" fill="#3aa7c9"/>
    <!-- shoulders / coat -->
    <path d="M350 560 Q512 520 674 560 L688 740 L336 740 Z" fill="#e0f8ff" stroke="#3aa7c9" stroke-width="14"/>
    <!-- cross badge -->
    <g transform="translate(614 630)">
      <circle r="44" fill="#ff6b70"/>
      <rect x="-11" y="-27" width="22" height="54" rx="5" fill="#ffffff"/>
      <rect x="-27" y="-11" width="54" height="22" rx="5" fill="#ffffff"/>
    </g>
    <!-- stethoscope -->
    <path d="M428 570 Q428 690 512 690 Q596 690 596 570" fill="none" stroke="#2f88a5" stroke-width="18" stroke-linecap="round"/>
    <circle cx="512" cy="714" r="30" fill="#2f88a5"/>
    <!-- scanlines -->
    <g fill="#ffffff" opacity="0.25">
      <rect x="300" y="330" width="430" height="12"/>
      <rect x="300" y="430" width="430" height="12"/>
      <rect x="300" y="530" width="430" height="12"/>
      <rect x="300" y="630" width="410" height="12"/>
    </g>
  </g>

  <!-- phone at the bottom, source of the beam -->
  <g transform="translate(512 900)">
    <rect x="-96" y="-58" width="192" height="128" rx="26" fill="#2c3a42"/>
    <rect x="-78" y="-42" width="156" height="96" rx="14" fill="#a5eaff"/>
    <rect x="-24" y="42" width="48" height="10" rx="5" fill="#8fa3ad"/>
  </g>

  <!-- sparkles -->
  <path d="M240 380 L252 408 L280 420 L252 432 L240 460 L228 432 L200 420 L228 408 Z" fill="#ffffff" opacity="0.85"/>
  <path d="M790 500 L799 521 L820 530 L799 539 L790 560 L781 539 L760 530 L781 521 Z" fill="#ffffff" opacity="0.75"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DFF0CE"/>
      <stop offset="1" stop-color="#A8CC8F"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFB347"/>
      <stop offset="1" stop-color="#F2801E"/>
    </linearGradient>
    <linearGradient id="petal2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFC66E"/>
      <stop offset="1" stop-color="#F79233"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- background leaves -->
  <g fill="#5E9A4E" opacity="0.85">
    <path d="M120 800 C90 560 130 420 240 330 C190 480 180 620 210 800 Z"/>
    <path d="M680 800 C720 570 690 430 580 340 C640 490 650 630 620 800 Z"/>
    <path d="M300 800 C260 640 280 540 350 470 C320 580 330 690 360 800 Z" opacity="0.7"/>
    <path d="M520 800 C560 650 540 550 470 480 C510 590 500 700 470 800 Z" opacity="0.7"/>
  </g>
  <!-- stem -->
  <path d="M395 800 C390 640 392 540 400 460" stroke="#4E8A40" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- daylily: 3 back petals, 3 front petals, curved trumpet shape -->
  <g>
    <!-- back petals -->
    <path d="M400 420 C300 380 220 300 210 190 C330 200 400 280 410 400 Z" fill="url(#petal2)"/>
    <path d="M400 420 C500 380 580 300 590 190 C470 200 400 280 390 400 Z" fill="url(#petal2)"/>
    <path d="M400 415 C370 300 380 200 400 100 C420 200 430 300 400 415 Z" fill="url(#petal2)"/>
    <!-- front petals -->
    <path d="M400 430 C280 420 190 360 150 260 C280 250 380 320 405 415 Z" fill="url(#petal)"/>
    <path d="M400 430 C520 420 610 360 650 260 C520 250 420 320 395 415 Z" fill="url(#petal)"/>
    <path d="M400 440 C330 520 310 610 330 700 C420 640 450 540 415 435 Z" fill="url(#petal)"/>
    <!-- petal midribs -->
    <g stroke="#D9641A" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.7">
      <path d="M400 425 C330 400 260 350 210 275"/>
      <path d="M400 425 C470 400 540 350 590 275"/>
      <path d="M400 420 C398 330 398 240 400 150"/>
      <path d="M405 435 C370 520 355 600 350 665"/>
    </g>
    <!-- throat -->
    <circle cx="400" cy="425" r="46" fill="#FFE08A"/>
    <circle cx="400" cy="425" r="24" fill="#E8F5C4"/>
    <!-- stamens -->
    <g stroke="#E8B84B" stroke-width="6" fill="none" stroke-linecap="round">
      <path d="M400 425 C440 380 480 350 520 340"/>
      <path d="M400 425 C430 360 450 320 470 290"/>
      <path d="M400 425 C370 360 350 320 330 290"/>
    </g>
    <g fill="#8A5A33">
      <ellipse cx="524" cy="338" rx="13" ry="7" transform="rotate(20 524 338)"/>
      <ellipse cx="472" cy="287" rx="13" ry="7" transform="rotate(55 472 287)"/>
      <ellipse cx="328" cy="287" rx="13" ry="7" transform="rotate(-55 328 287)"/>
    </g>
  </g>

  <!-- a second smaller bloom, background right -->
  <g transform="translate(610 520) scale(0.38)" opacity="0.9">
    <path d="M400 430 C280 420 190 360 150 260 C280 250 380 320 405 415 Z" fill="url(#petal)"/>
    <path d="M400 430 C520 420 610 360 650 260 C520 250 420 320 395 415 Z" fill="url(#petal)"/>
    <path d="M400 415 C370 300 380 200 400 100 C420 200 430 300 400 415 Z" fill="url(#petal2)"/>
    <circle cx="400" cy="425" r="46" fill="#FFE08A"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Loading scene: robot doctor photographing a patient's arm rash,
       mirroring the parent app's explorer-photographs-critter layout -->
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7f4f9"/>
      <stop offset="1" stop-color="#d3ebf2"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#wall)"/>
  <!-- floor -->
  <path d="M0 780 Q512 720 1024 780 L1024 1024 L0 1024 Z" fill="#bcd9c9"/>

  <!-- wall clock (sun stand-in) -->
  <circle cx="880" cy="150" r="86" fill="#ffffff" stroke="#c3d4da" stroke-width="10"/>
  <line x1="880" y1="150" x2="880" y2="100" stroke="#4a6572" stroke-width="12" stroke-linecap="round"/>
  <line x1="880" y1="150" x2="916" y2="168" stroke="#4a6572" stroke-width="12" stroke-linecap="round"/>
  <circle cx="880" cy="150" r="10" fill="#4a6572"/>

  <!-- framed cross poster -->
  <rect x="120" y="110" width="160" height="200" rx="14" fill="#ffffff" stroke="#c3d4da" stroke-width="10"/>
  <rect x="184" y="150" width="32" height="120" rx="8" fill="#ff5a5f"/>
  <rect x="140" y="194" width="120" height="32" rx="8" fill="#ff5a5f"/>

  <!-- ===== robot doctor, left ===== -->
  <g>
    <!-- antenna -->
    <rect x="304" y="298" width="18" height="44" rx="9" fill="#8fa3ad"/>
    <circle cx="313" cy="290" r="24" fill="#ff5a5f"/>
    <rect x="306" y="280" width="14" height="21" rx="4" fill="#ffffff"/>
    <rect x="302" y="283" width="21" height="14" rx="4" fill="#ffffff"/>
    <!-- head -->
    <rect x="212" y="336" width="204" height="158" rx="46" fill="#f4f7f8" stroke="#d7dfe3" stroke-width="8"/>
    <rect x="212" y="360" width="204" height="20" rx="10" fill="#7fc8d9"/>
    <circle cx="314" cy="370" r="24" fill="#e8eef0" stroke="#b7c6cc" stroke-width="6"/>
    <!-- eyes / smile -->
    <circle cx="272" cy="428" r="24" fill="#243b47"/>
    <circle cx="356" cy="428" r="24" fill="#243b47"/>
    <circle cx="280" cy="420" r="7" fill="#ffffff"/>
    <circle cx="364" cy="420" r="7" fill="#ffffff"/>
    <path d="M288 462 Q314 482 340 462" fill="none" stroke="#243b47" stroke-width="9" stroke-linecap="round"/>
    <!-- body: coat -->
    <path d="M226 516 Q314 492 402 516 L416 810 L212 810 Z" fill="#ffffff" stroke="#d7dfe3" stroke-width="8"/>
    <!-- badge -->
    <g transform="translate(366 590)">
      <circle r="26" fill="#ff5a5f"/>
      <rect x="-6" y="-16" width="12" height="32" rx="3" fill="#ffffff"/>
      <rect x="-16" y="-6" width="32" height="12" rx="3" fill="#ffffff"/>
    </g>
    <!-- stethoscope -->
    <path d="M262 522 Q262 640 314 640 Q366 640 366 522" fill="none" stroke="#4a6572" stroke-width="12" stroke-linecap="round"/>
    <circle cx="314" cy="658" r="22" fill="#4a6572"/>
    <circle cx="314" cy="658" r="11" fill="#9fb6bf"/>
    <!-- arm holding phone toward patient -->
    <path d="M400 560 Q470 540 500 566" fill="none" stroke="#f4f7f8" stroke-width="42" stroke-linecap="round"/>
    <circle cx="506" cy="570" r="26" fill="#8fa3ad"/>
    <!-- phone -->
    <g transform="translate(524 566) rotate(12)">
      <rect x="-34" y="-62" width="68" height="124" rx="16" fill="#37474f"/>
      <rect x="-24" y="-48" width="48" height="88" rx="8" fill="#90caf9"/>
      <circle cx="0" cy="50" r="7" fill="#cfd8dc"/>
    </g>
    <!-- camera sparkle -->
    <path d="M596 470 L610 502 L642 516 L610 530 L596 562 L582 530 L550 516 L582 502 Z" fill="#ffd54f"/>
  </g>

  <!-- ===== patient, right ===== -->
  <g>
    <!-- head -->
    <circle cx="806" cy="430" r="86" fill="#f6c9a0"/>
    <path d="M726 392 Q806 320 886 392 Q866 348 806 344 Q746 348 726 392 Z" fill="#6d4c41"/>
    <circle cx="778" cy="428" r="11" fill="#243b47"/>
    <circle cx="834" cy="428" r="11" fill="#243b47"/>
    <circle cx="756" cy="462" r="12" fill="#ffb3ad"/>
    <circle cx="856" cy="462" r="12" fill="#ffb3ad"/>
    <path d="M784 470 Q806 484 828 470" fill="none" stroke="#243b47" stroke-width="7" stroke-linecap="round"/>
    <!-- shirt -->
    <path d="M726 540 Q806 512 886 540 L906 810 L706 810 Z" fill="#7fb3d5"/>
    <!-- extended bare arm toward the doctor, rash on forearm -->
    <path d="M756 566 Q660 592 588 640" fill="none" stroke="#f6c9a0" stroke-width="46" stroke-linecap="round"/>
    <circle cx="584" cy="642" r="27" fill="#f6c9a0"/>
    <!-- bullseye rash on the forearm -->
    <g transform="translate(636 616) rotate(-24)">
      <circle r="34" fill="#f28b82"/>
      <circle r="22" fill="#f6c9a0"/>
      <circle r="10" fill="#e57373"/>
    </g>
  </g>

  <!-- camera reticle around the rash -->
  <g stroke="#ffffff" stroke-width="14" fill="none" stroke-linecap="round">
    <path d="M528 528 L528 496 L560 496"/>
    <path d="M712 496 L744 496 L744 528"/>
    <path d="M744 704 L744 736 L712 736"/>
    <path d="M560 736 L528 736 L528 704"/>
  </g>
</svg>

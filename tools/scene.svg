<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Loading scene: a hiker out in nature talking to a hologram robot
       doctor projected out of their phone — the product in one picture. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aedcf2"/>
      <stop offset="1" stop-color="#d9efdd"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#9fe8ff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#9fe8ff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#sky)"/>

  <!-- sun + clouds -->
  <circle cx="880" cy="140" r="88" fill="#f7e08c" opacity="0.55"/>
  <circle cx="880" cy="140" r="60" fill="#f9d95d"/>
  <ellipse cx="220" cy="130" rx="86" ry="30" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="300" cy="158" rx="60" ry="22" fill="#ffffff" opacity="0.75"/>
  <ellipse cx="620" cy="90" rx="64" ry="22" fill="#ffffff" opacity="0.8"/>

  <!-- hills -->
  <path d="M0 760 Q250 660 520 740 Q800 820 1024 720 L1024 1024 L0 1024 Z" fill="#9ecf8f"/>
  <path d="M0 850 Q300 780 640 860 Q880 910 1024 850 L1024 1024 L0 1024 Z" fill="#7fbf74"/>

  <!-- pines, left -->
  <g fill="#4e9153">
    <path d="M120 700 L170 610 L220 700 Z"/>
    <path d="M112 760 L170 660 L228 760 Z"/>
    <rect x="158" y="760" width="24" height="46" fill="#7a5230"/>
  </g>
  <g fill="#579a5c">
    <path d="M20 740 L58 672 L96 740 Z"/>
    <path d="M14 788 L58 712 L102 788 Z"/>
    <rect x="49" y="788" width="18" height="36" fill="#7a5230"/>
  </g>

  <!-- ===== hologram beam from the phone ===== -->
  <path d="M676 664 L700 664 L560 250 L300 250 Z" fill="url(#beam)"/>
  <ellipse cx="430" cy="252" rx="132" ry="16" fill="#9fe8ff" opacity="0.35"/>

  <!-- ===== hologram robot doctor (cyan, translucent) ===== -->
  <g opacity="0.9">
    <ellipse cx="430" cy="430" rx="190" ry="200" fill="#bdf0ff" opacity="0.30"/>
    <!-- antenna -->
    <rect x="421" y="238" width="14" height="30" rx="7" fill="#3aa7c9"/>
    <circle cx="428" cy="232" r="16" fill="#59c3e3"/>
    <!-- head -->
    <rect x="352" y="268" width="156" height="118" rx="36" fill="#c9f2ff" stroke="#3aa7c9" stroke-width="7"/>
    <rect x="352" y="286" width="156" height="16" rx="8" fill="#59c3e3"/>
    <circle cx="430" cy="294" r="18" fill="#e6faff" stroke="#3aa7c9" stroke-width="5"/>
    <circle cx="398" cy="336" r="16" fill="#166f8d"/>
    <circle cx="462" cy="336" r="16" fill="#166f8d"/>
    <circle cx="403" cy="331" r="5" fill="#ffffff"/>
    <circle cx="467" cy="331" r="5" fill="#ffffff"/>
    <path d="M406 362 Q430 378 454 362" fill="none" stroke="#166f8d" stroke-width="7" stroke-linecap="round"/>
    <!-- body: coat -->
    <path d="M362 402 Q430 384 498 402 L512 570 L348 570 Z" fill="#dcf7ff" stroke="#3aa7c9" stroke-width="7"/>
    <!-- waving arm -->
    <path d="M494 420 Q560 400 578 348" fill="none" stroke="#c9f2ff" stroke-width="26" stroke-linecap="round"/>
    <circle cx="582" cy="342" r="17" fill="#c9f2ff" stroke="#3aa7c9" stroke-width="5"/>
    <!-- cross badge -->
    <g transform="translate(470 452)">
      <circle r="20" fill="#ff7b80"/>
      <rect x="-5" y="-12" width="10" height="24" rx="2" fill="#ffffff"/>
      <rect x="-12" y="-5" width="24" height="10" rx="2" fill="#ffffff"/>
    </g>
    <!-- stethoscope -->
    <path d="M394 406 Q394 496 430 496 Q466 496 466 406" fill="none" stroke="#2f88a5" stroke-width="9" stroke-linecap="round"/>
    <circle cx="430" cy="510" r="16" fill="#2f88a5"/>
    <!-- hologram scanlines -->
    <g fill="#ffffff" opacity="0.28">
      <rect x="330" y="300" width="270" height="7"/>
      <rect x="330" y="360" width="270" height="7"/>
      <rect x="330" y="420" width="285" height="7"/>
      <rect x="330" y="480" width="270" height="7"/>
      <rect x="330" y="540" width="250" height="7"/>
    </g>
  </g>

  <!-- ===== hiker, right, looking up at the hologram ===== -->
  <g>
    <!-- head, facing left -->
    <circle cx="768" cy="560" r="62" fill="#f6c9a0"/>
    <path d="M714 528 Q768 476 826 526 Q810 492 768 488 Q726 492 714 528 Z" fill="#6d4c41"/>
    <circle cx="742" cy="556" r="9" fill="#243b47"/>
    <circle cx="782" cy="556" r="9" fill="#243b47"/>
    <circle cx="726" cy="584" r="10" fill="#ffb3ad"/>
    <path d="M746 590 Q764 602 782 590" fill="none" stroke="#243b47" stroke-width="6" stroke-linecap="round"/>
    <!-- body -->
    <path d="M712 636 Q768 612 824 636 L844 850 L692 850 Z" fill="#e07a5f"/>
    <!-- backpack strap -->
    <path d="M736 640 L748 830" stroke="#8d5a3b" stroke-width="16" stroke-linecap="round"/>
    <!-- arm holding the phone up toward the hologram -->
    <path d="M716 668 Q670 660 664 636" fill="none" stroke="#f6c9a0" stroke-width="30" stroke-linecap="round"/>
    <!-- phone -->
    <g transform="translate(668 646) rotate(-18)">
      <rect x="-26" y="-46" width="52" height="92" rx="12" fill="#37474f"/>
      <rect x="-18" y="-35" width="36" height="66" rx="6" fill="#9fe8ff"/>
    </g>
  </g>
</svg>
